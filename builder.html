<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Printing Press</title>
    <style>
        /* General Setup */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Toolbar */
        #toolbar { width: 250px; background: #1e293b; color: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); overflow-y: auto; z-index: 100; }
        #toolbar h2 { margin-top: 0; font-size: 18px; color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .tool-btn { display: block; width: 100%; background: #3b82f6; color: white; border: none; padding: 12px; margin-bottom: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tool-btn:hover { background: #2563eb; }
        .tool-btn.secondary { background: #475569; }
        .tool-btn.secondary:hover { background: #64748b; }
        
        /* Sticker Grid */
        .sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .sticker-item { font-size: 24px; text-align: center; cursor: pointer; background: #334155; border-radius: 6px; padding: 5px; transition: 0.2s; user-select: none; }
        .sticker-item:hover { background: #fbbf24; transform: scale(1.1); }
        
        /* The Magical Shapes */
        .shape-neon-circle { width: 40px; height: 40px; border: 4px solid #22d3ee; border-radius: 50%; box-shadow: 0 0 10px #22d3ee, inset 0 0 10px #22d3ee; }
        .shape-alert-box { width: 40px; height: 20px; background: rgba(239, 68, 68, 0.2); border: 2px dashed #ef4444; }

        /* Workspace Area */
        #workspace-container { flex-grow: 1; padding: 30px; display: flex; justify-content: center; align-items: flex-start; overflow: auto; }
        
        /* The Brochure Canvas (A4 Landscape aspect ratio approximation) */
        #canvas { width: 840px; height: 594px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; overflow: hidden; display: flex; }
        
        /* The 3 Brochure Panels */
        .panel { flex: 1; border-right: 2px dashed #e2e8f0; height: 100%; position: relative; pointer-events: none; }
        .panel:last-child { border-right: none; }
        
        /* Draggable Items */
        .draggable { position: absolute; cursor: grab; padding: 5px; z-index: 10; }
        .draggable:active { cursor: grabbing; z-index: 99; outline: 2px dashed #3b82f6; }
        
        /* Text styling */
        .brochure-heading { font-size: 28px; font-weight: 900; color: #0f172a; margin: 0; min-width: 150px; }
        .brochure-text { font-size: 14px; color: #475569; margin: 0; min-width: 150px; line-height: 1.5; }
        
        /* Hide UI when printing/saving to PDF */
        @media print {
            body { background: white; }
            #toolbar { display: none; }
            #workspace-container { padding: 0; }
            #canvas { box-shadow: none; border: none; }
            .panel { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <h2>🛠️ Builder Tools</h2>
        
        <button class="tool-btn" onclick="addHeading()">+ Add Heading</button>
        <button class="tool-btn secondary" onclick="addText()">+ Add Normal Text</button>
        
        <input type="file" id="imageLoader" accept="image/*" style="display: none;">
        <button class="tool-btn" onclick="document.getElementById('imageLoader').click();" style="background: #10b981;">📸 Upload Image</button>
        
        <h2 style="margin-top: 20px;">✨ Magic Stickers</h2>
        <div class="sticker-grid">
            <div class="sticker-item" onclick="addSticker('🌲')">🌲</div>
            <div class="sticker-item" onclick="addSticker('⚔️')">⚔️</div>
            <div class="sticker-item" onclick="addSticker('🗺️')">🗺️</div>
            <div class="sticker-item" onclick="addSticker('👑')">👑</div>
            <div class="sticker-item" onclick="addSticker('⭐')">⭐</div>
            <div class="sticker-item" onclick="addSticker('🔥')">🔥</div>
            <div class="sticker-item" onclick="addSticker('⚠️')">⚠️</div>
            <div class="sticker-item" onclick="addSticker('📍')">📍</div>
        </div>

        <h2 style="margin-top: 10px;">⭕ Highlight Shapes</h2>
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <div class="sticker-item shape-neon-circle" onclick="addShape('shape-neon-circle')" title="Neon Circle"></div>
            <div class="sticker-item shape-alert-box" onclick="addShape('shape-alert-box')" title="Alert Box"></div>
        </div>

        <hr style="border-color: #334155;">
        <p style="font-size: 12px; color: #94a3b8; text-align: center;"><em>Double-click any item on the canvas to delete it.</em></p>

        <button class="tool-btn" onclick="window.print()" style="background: #ef4444; margin-top: 20px;">🖨️ Save as PDF / Print</button>
    </div>

    <div id="workspace-container">
        <div id="canvas">
            <div class="panel"></div>
            <div class="panel"></div>
            <div class="panel"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');

        // Drag and Drop State
        let activeItem = null;
        let offsetX = 0;
        let offsetY = 0;

        // Makes an element draggable
        function makeDraggable(el) {
            el.addEventListener('mousedown', (e) => {
                activeItem = el;
                offsetX = e.clientX - el.getBoundingClientRect().left;
                offsetY = e.clientY - el.getBoundingClientRect().top;
            });
            
            // Double click to delete
            el.addEventListener('dblclick', () => {
                el.remove();
            });
        }

        // Global Mouse Events for dragging
        document.addEventListener('mousemove', (e) => {
            if (activeItem) {
                const canvasRect = canvas.getBoundingClientRect();
                // Calculate position relative to canvas
                let newX = e.clientX - canvasRect.left - offsetX;
                let newY = e.clientY - canvasRect.top - offsetY;
                
                // Keep inside canvas bounds loosely
                activeItem.style.left = `${newX}px`;
                activeItem.style.top = `${newY}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            activeItem = null;
        });

        // Add Heading
        function addHeading() {
            const el = document.createElement('h1');
            el.className = 'draggable brochure-heading';
            el.contentEditable = "true";
            el.innerText = "New Heading";
            el.style.left = '50px';
            el.style.top = '50px';
            makeDraggable(el);
            canvas.appendChild(el);
        }

        // Add Normal Text
        function addText() {
            const el = document.createElement('p');
            el.className = 'draggable brochure-text';
            el.contentEditable = "true";
            el.innerText = "Type your facts here... Keep it short!";
            el.style.left = '50px';
            el.style.top = '100px';
            makeDraggable(el);
            canvas.appendChild(el);
        }

        // Add Sticker (Emoji)
        function addSticker(emoji) {
            const el = document.createElement('div');
            el.className = 'draggable';
            el.style.fontSize = '40px';
            el.innerText = emoji;
            el.style.left = '100px';
            el.style.top = '150px';
            makeDraggable(el);
            canvas.appendChild(el);
        }

        // Add Special Shape
        function addShape(shapeClass) {
            const el = document.createElement('div');
            el.className = `draggable ${shapeClass}`;
            el.style.left = '100px';
            el.style.top = '150px';
            makeDraggable(el);
            canvas.appendChild(el);
        }

        // Handle Image Upload
        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.createElement('img');
                img.className = 'draggable';
                img.src = event.target.result;
                img.style.maxWidth = '200px'; // Restrict size
                img.style.left = '100px';
                img.style.top = '100px';
                // Prevent default image drag ghosting
                img.ondragstart = function() { return false; }; 
                makeDraggable(img);
                canvas.appendChild(img);
            }
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
