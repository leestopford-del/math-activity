<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Royal Printing Press - Multiplayer</title>
    <style>
        body { margin: 0; padding: 0; background: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #game-container { position: relative; margin-top: 20px; width: 720px; max-width: 100%; border: 4px solid #78350f; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: auto; }
        
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #start-screen h1 { color: #fbbf24; margin-bottom: 20px; }
        #player-name-input { padding: 10px; font-size: 16px; border-radius: 4px; border: none; margin-bottom: 20px; width: 200px; text-align: center; }
        .char-select-btn { background: #3b82f6; color: white; border: 2px solid #60a5fa; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .char-select-btn:hover { background: #2563eb; transform: scale(1.05); }

        #dialogue-box { position: absolute; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 4px solid #f8fafc; padding: 20px; box-sizing: border-box; display: none; z-index: 50; }
        #speaker-name { color: #fbbf24; font-weight: bold; font-size: 18px; margin-top: 0; margin-bottom: 10px; }
        #dialogue-text { font-size: 16px; margin-bottom: 15px; line-height: 1.5; }
        .quiz-btn, #continue-btn { display: block; width: 100%; text-align: left; background: #334155; color: white; border: 1px solid #475569; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .quiz-btn:hover, #continue-btn:hover { background: #475569; }
        #continue-btn { text-align: center; font-weight: bold; background: #2563eb; border-color: #3b82f6; }
        #quiz-options { display: none; } 
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="720" height="480"></canvas>

        <div id="start-screen">
            <h1>The Royal Printing Press</h1>
            <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="12">
            <div>
                <button class="char-select-btn" onclick="startGame(0)">Select Purple Hair</button>
                <button class="char-select-btn" onclick="startGame(2)" style="background: #ec4899; border-color: #f472b6;">Select Pink Hair</button>
            </div>
        </div>

        <div id="dialogue-box">
            <h3 id="speaker-name">Name</h3>
            <p id="dialogue-text">Text goes here...</p>
            <button id="continue-btn" onclick="closeDialogue()">Continue</button>
            <div id="quiz-options">
                <button class="quiz-btn" onclick="checkAnswer(false)">A) The forest covers over 10,000 acres.</button>
                <button class="quiz-btn" onclick="checkAnswer(true)">B) Are you ready to step into a world of ultimate adventure?</button>
                <button class="quiz-btn" onclick="checkAnswer(false)">C) You should visit the gift shop.</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets",
            storageBucket: "symmetry-and-nets.firebasestorage.app",
            messagingSenderId: "250211420064",
            appId: "1:250211420064:web:fe4a064715042bedf546c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const imgMap = new Image(); imgMap.src = '1-0f8bf240.jpg'; 
        const imgSprites = new Image(); imgSprites.src = 'chibi-layered.png'; 
        const imgAnimals = new Image(); imgAnimals.src = 'spritesheet.png'; 

        let gameActive = false;
        let isDialogueOpen = false;
        let canRoam = false; 

        // Multiplayer Variables
        const playerId = 'player_' + Math.floor(Math.random() * 1000000); // Unique ID for this browser tab
        let otherPlayers = {}; 
        let lastFirebaseUpdate = 0;

        let player = { 
            x: 100, y: 100, width: 48, height: 48, speed: 4, 
            spriteW: 16, spriteH: 16, frameX: 0, frameY: 0,
            direction: 'down', isMoving: false, walkFrame: 0, animTimer: 0,
            name: "Student"
        };
        
        let npc = { x: 150, y: 50, width: 48, height: 48, spriteW: 16, spriteH: 16, frameX: 0, frameY: 1 };

        let animals = [
            { type: 'Bear', x: 300, y: 150, startX: 300, range: 60, speed: 0.5, dir: 1, frameY: 5, spriteW: 32, spriteH: 32 },
            { type: 'Sheep', x: 250, y: 200, startX: 250, range: 40, speed: 0.3, dir: 1, frameY: 6, spriteW: 32, spriteH: 32 },
            { type: 'Sheep', x: 350, y: 220, startX: 350, range: 40, speed: 0.4, dir: -1, frameY: 6, spriteW: 32, spriteH: 32 },
            { type: 'Dog', x: 150, y: 350, startX: 150, range: 80, speed: 1, dir: 1, frameY: 8, spriteW: 32, spriteH: 32 },
            { type: 'Snake', x: 500, y: 100, startX: 500, range: 30, speed: 0.2, dir: -1, frameY: 0, spriteW: 32, spriteH: 32 },
            { type: 'Seagull', x: 500, y: 350, startX: 500, range: 100, speed: 1.5, dir: 1, frameY: 4, spriteW: 32, spriteH: 32 },
            { type: 'Seagull', x: 600, y: 400, startX: 600, range: 80, speed: 1.2, dir: -1, frameY: 4, spriteW: 32, spriteH: 32 }
        ];

        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // --- GLOBAL FUNCTIONS (So HTML buttons can click them) ---
        window.startGame = function(selectedRow) {
            let nameInput = document.getElementById('player-name-input').value;
            if (nameInput.trim() !== "") player.name = nameInput;

            player.frameY = selectedRow; 
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            
            // 1. JOIN MULTIPLAYER
            const playerRef = ref(db, `players/${playerId}`);
            set(playerRef, { x: player.x, y: player.y, name: player.name, frameX: player.frameX, frameY: player.frameY, direction: player.direction });
            
            // Delete player from DB if they close the tab
            onDisconnect(playerRef).remove();

            // 2. LISTEN FOR OTHER PLAYERS
            const allPlayersRef = ref(db, 'players');
            onValue(allPlayersRef, (snapshot) => {
                otherPlayers = snapshot.val() || {};
                delete otherPlayers[playerId]; // Don't draw ourselves as a ghost!
            });

            setTimeout(() => {
                openDialogue("Master Editor", `Welcome, ${player.name}! You cannot explore the wilds until you prove your worth. Which sentence uses a <strong>rhetorical question</strong>?`, 'quiz');
            }, 500); 

            gameLoop(); 
        };

        window.openDialogue = function(speaker, text, type) {
            isDialogueOpen = true; player.isMoving = false; 
            document.getElementById('speaker-name').innerHTML = speaker;
            document.getElementById('dialogue-text').innerHTML = text;
            document.getElementById('dialogue-box').style.display = 'block';

            if (type === 'quiz') {
                document.getElementById('quiz-options').style.display = 'block';
                document.getElementById('continue-btn').style.display = 'none';
            } else {
                document.getElementById('quiz-options').style.display = 'none';
                document.getElementById('continue-btn').style.display = 'block';
            }
        };

        window.closeDialogue = function() {
            document.getElementById('dialogue-box').style.display = 'none';
            setTimeout(() => { isDialogueOpen = false; }, 200); 
        };

        window.checkAnswer = function(isCorrect) {
            if (isCorrect) {
                canRoam = true; 
                window.openDialogue("Master Editor", "<strong>Correct!</strong> A rhetorical question makes the reader think! The path is now open. Go gather facts for your brochure!", 'story');
            } else {
                window.openDialogue("Master Editor", "Incorrect! Remember, a rhetorical question hooks the reader with a question mark. Try again!", 'quiz');
            }
        };

        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });
        window.addEventListener('keydown', (e) => { 
            if ((e.key === ' ' || e.key === 'Enter') && gameActive && !isDialogueOpen) {
                let dist = Math.hypot(player.x - npc.x, player.y - npc.y);
                if (dist < 60) window.openDialogue("Master Editor", "Which sentence uses a <strong>rhetorical question</strong>?", 'quiz');
            }
        });

        // --- UPDATE LOOP ---
        function update() {
            if (!gameActive || isDialogueOpen) return; 

            player.isMoving = false; 
            if (keys.ArrowUp || keys.w) { player.y -= player.speed; player.direction = 'up'; player.isMoving = true; }
            if (keys.ArrowDown || keys.s) { player.y += player.speed; player.direction = 'down'; player.isMoving = true; }
            if (keys.ArrowLeft || keys.a) { player.x -= player.speed; player.direction = 'left'; player.isMoving = true; }
            if (keys.ArrowRight || keys.d) { player.x += player.speed; player.direction = 'right'; player.isMoving = true; }

            if (!canRoam) {
                if (player.x > 250) player.x = 250;
                if (player.y > 200) player.y = 200;
            }

            if(player.x < 0) player.x = 0;
            if(player.y < 0) player.y = 0;
            if(player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if(player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            if (player.isMoving) {
                player.animTimer++;
                if (player.animTimer >= 12) { player.walkFrame = player.walkFrame === 0 ? 1 : 0; player.animTimer = 0; }
            } else { player.walkFrame = 0; }

            let previousFrameX = player.frameX;
            if (player.direction === 'down') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 3 : 6) : 0;
            else if (player.direction === 'up') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 5 : 8) : 2;
            else if (player.direction === 'left' || player.direction === 'right') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 4 : 7) : 1;

            // PUSH TO FIREBASE (If moved or animation changed)
            if (player.isMoving || player.frameX !== previousFrameX) {
                const now = Date.now();
                if (now - lastFirebaseUpdate > 30) { // Limit updates so we don't spam the server
                    update(ref(db, `players/${playerId}`), {
                        x: player.x, y: player.y, frameX: player.frameX, direction: player.direction
                    });
                    lastFirebaseUpdate = now;
                }
            }

            animals.forEach(a => {
                a.x += a.speed * a.dir;
                if (a.x > a.startX + a.range || a.x < a.startX - a.range) a.dir *= -1; 
            });
        }

        // --- DRAW LOOP ---
        function draw() {
            if(!gameActive) return;

            if(imgMap.complete && imgMap.naturalWidth !== 0) ctx.drawImage(imgMap, 0, 0, canvas.width, canvas.height);

            if(imgAnimals.complete && imgAnimals.naturalWidth !== 0) {
                animals.forEach(a => {
                    ctx.save();
                    if (a.dir === -1) {
                        ctx.scale(-1, 1);
                        ctx.drawImage(imgAnimals, 0, a.frameY * a.spriteH, a.spriteW, a.spriteH, -a.x - 32, a.y, 32, 32);
                    } else {
                        ctx.drawImage(imgAnimals, 0, a.frameY * a.spriteH, a.spriteW, a.spriteH, a.x, a.y, 32, 32);
                    }
                    ctx.restore();
                });
            }

            if(imgSprites.complete) ctx.drawImage(imgSprites, npc.frameX * npc.spriteW, npc.frameY * npc.spriteH, npc.spriteW, npc.spriteH, npc.x, npc.y, npc.width, npc.height);

            // DRAW OTHER PLAYERS FROM FIREBASE
            if (imgSprites.complete) {
                for (let id in otherPlayers) {
                    let p = otherPlayers[id];
                    ctx.save(); 
                    if (p.direction === 'right') {
                        ctx.scale(-1, 1);
                        ctx.drawImage(imgSprites, p.frameX * player.spriteW, p.frameY * player.spriteH, player.spriteW, player.spriteH, -p.x - player.width, p.y, player.width, player.height);
                    } else {
                        ctx.drawImage(imgSprites, p.frameX * player.spriteW, p.frameY * player.spriteH, player.spriteW, player.spriteH, p.x, p.y, player.width, player.height);
                    }
                    ctx.restore(); 

                    // OTHER PLAYER NAME TAGS
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.fillRect(p.x - 10, p.y - 20, player.width + 20, 18);
                    ctx.fillStyle = "#fbbf24"; // Gold text for other players
                    ctx.font = "12px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(p.name, p.x + (player.width / 2), p.y - 7);
                }
            }

            // DRAW LOCAL PLAYER
            if(imgSprites.complete) {
                ctx.save(); 
                if (player.direction === 'right') {
                    ctx.scale(-1, 1);
                    ctx.drawImage(imgSprites, player.frameX * player.spriteW, player.frameY * player.spriteH, player.spriteW, player.spriteH, -player.x - player.width, player.y, player.width, player.height);
                } else {
                    ctx.drawImage(imgSprites, player.frameX * player.spriteW, player.frameY * player.spriteH, player.spriteW, player.spriteH, player.x, player.y, player.width, player.height);
                }
                ctx.restore(); 

                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(player.x - 10, player.y - 20, player.width + 20, 18);
                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.textAlign = "center";
                ctx.fillText(player.name, player.x + (player.width / 2), player.y - 7);
            }
        }

        function gameLoop() { update(); draw(); if(gameActive) requestAnimationFrame(gameLoop); }
    </script>
</body>
</html>
