<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Royal Printing Press - Adventure</title>
    <style>
        body { margin: 0; padding: 0; background: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* The Game Container holds the canvas and all the menus */
        #game-container { position: relative; margin-top: 20px; width: 640px; max-width: 100%; border: 4px solid #78350f; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: auto; }
        
        /* START SCREEN UI */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #start-screen h1 { color: #fbbf24; margin-bottom: 30px; }
        .char-select-btn { background: #3b82f6; color: white; border: 2px solid #60a5fa; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .char-select-btn:hover { background: #2563eb; transform: scale(1.05); }

        /* RPG DIALOGUE BOX UI */
        #dialogue-box { position: absolute; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 4px solid #f8fafc; padding: 20px; box-sizing: border-box; display: none; z-index: 50; }
        #speaker-name { color: #fbbf24; font-weight: bold; font-size: 18px; margin-top: 0; margin-bottom: 10px; }
        #dialogue-text { font-size: 16px; margin-bottom: 15px; line-height: 1.5; }
        .quiz-btn { display: block; width: 100%; text-align: left; background: #334155; color: white; border: 1px solid #475569; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .quiz-btn:hover { background: #475569; }
        
        /* Mobile Controls */
        #mobile-controls { display: flex; gap: 20px; margin-top: 20px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .btn { background: #555; border: 2px solid #777; border-radius: 8px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; user-select: none; }
        .btn:active { background: #777; }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
        
        #action-btn { width: 80px; height: 80px; border-radius: 50%; background: #ef4444; margin-top: 35px; border: 4px solid #b91c1c; font-size: 16px; }
        #action-btn:active { background: #dc2626; }

        @media (min-width: 768px) { #mobile-controls { display: none; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="480"></canvas>

        <div id="start-screen">
            <h1>The Royal Printing Press</h1>
            <p style="font-size: 18px; margin-bottom: 20px;">Choose your apprentice:</p>
            <div>
                <button class="char-select-btn" onclick="startGame(0)">Select Purple Hair</button>
                <button class="char-select-btn" onclick="startGame(2)" style="background: #ec4899; border-color: #f472b6;">Select Pink Hair</button>
            </div>
        </div>

        <div id="dialogue-box">
            <h3 id="speaker-name">Master Editor</h3>
            <p id="dialogue-text">Halt, apprentice! Before you may use the printing press, you must prove your knowledge. Which of these sentences uses a <strong>rhetorical question</strong> to hook the reader?</p>
            
            <button class="quiz-btn" onclick="checkAnswer(false)">A) The forest covers over 10,000 acres of land.</button>
            <button class="quiz-btn" onclick="checkAnswer(true)">B) Are you ready to step into a world of ultimate magic and adventure?</button>
            <button class="quiz-btn" onclick="checkAnswer(false)">C) You should visit the gift shop because it has nice souvenirs.</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad">
            <button class="btn up" id="btn-up">▲</button>
            <button class="btn left" id="btn-left">◀</button>
            <button class="btn right" id="btn-right">▶</button>
            <button class="btn down" id="btn-down">▼</button>
        </div>
        <button class="btn" id="action-btn">TALK</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. ASSETS ---
        const imgMap = new Image(); imgMap.src = 'assets/map.png'; 
        // Both the Player and the NPC use this exact same image now!
        const imgSprites = new Image(); imgSprites.src = 'assets/chibi-layered.png'; 

        // --- 2. GAME VARIABLES ---
        let gameActive = false;
        let isDialogueOpen = false;

        let player = { 
            x: 300, y: 300, width: 48, height: 48, speed: 4,
            spriteW: 16, spriteH: 16, 
            frameX: 0, frameY: 0, // frameY is set when they pick a character!
            direction: 'up', isMoving: false, walkFrame: 0, animTimer: 0 
        };
        
        // NPC Variables (Using y=1 for the brown-haired editor)
        let npc = { 
            x: 300, y: 150, width: 48, height: 48,
            spriteW: 16, spriteH: 16, frameX: 0, frameY: 1 
        };

        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // --- 3. UI FUNCTIONS ---
        function startGame(selectedCharacterRow) {
            player.frameY = selectedCharacterRow; // 0 or 2
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            gameLoop(); // Kick off the game loop
        }

        function triggerDialogue() {
            if (isDialogueOpen) return;
            // Check distance
            let dx = player.x - npc.x;
            let dy = player.y - npc.y;
            if (Math.sqrt(dx * dx + dy * dy) < 60) {
                isDialogueOpen = true;
                player.isMoving = false; // Stop the player's legs from moving
                document.getElementById('dialogue-box').style.display = 'block';
            }
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                document.getElementById('dialogue-text').innerHTML = "<strong>Correct!</strong> A rhetorical question makes the reader think! You may proceed to the builder tool.";
                // Change the buttons to a single "Continue" button
                const buttons = document.querySelectorAll('.quiz-btn');
                buttons[0].style.display = 'none'; buttons[1].style.display = 'none'; buttons[2].style.display = 'none';
                
                setTimeout(() => {
                    document.getElementById('dialogue-box').style.display = 'none';
                    isDialogueOpen = false;
                    // Optional: You could make the Moodle link appear here!
                    alert("Congratulations! You have unlocked the Royal Printing Press!");
                }, 3000);
            } else {
                alert("Master Editor: Incorrect! Remember, a rhetorical question ends with a question mark. Try again!");
            }
        }

        // --- 4. CONTROLS ---
        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });
        window.addEventListener('keydown', (e) => { if ((e.key === ' ' || e.key === 'Enter') && gameActive) triggerDialogue(); });
        document.getElementById('action-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) triggerDialogue(); });

        const bindTouch = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        bindTouch('btn-up', 'ArrowUp'); bindTouch('btn-down', 'ArrowDown');
        bindTouch('btn-left', 'ArrowLeft'); bindTouch('btn-right', 'ArrowRight');

        // --- 5. GAME LOGIC ---
        function update() {
            if (!gameActive || isDialogueOpen) return; // FREEZE player if in a menu or talking!

            player.isMoving = false; 
            if (keys.ArrowUp || keys.w) { player.y -= player.speed; player.direction = 'up'; player.isMoving = true; }
            if (keys.ArrowDown || keys.s) { player.y += player.speed; player.direction = 'down'; player.isMoving = true; }
            if (keys.ArrowLeft || keys.a) { player.x -= player.speed; player.direction = 'left'; player.isMoving = true; }
            if (keys.ArrowRight || keys.d) { player.x += player.speed; player.direction = 'right'; player.isMoving = true; }

            // Collisions (Screen borders)
            if(player.x < 0) player.x = 0;
            if(player.y < 0) player.y = 0;
            if(player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if(player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            // Simple Collision with NPC (acts like a solid box)
            if (player.x < npc.x + npc.width && player.x + player.width > npc.x && player.y < npc.y + npc.height && player.y + player.height > npc.y) {
                // If they hit the NPC, push them back slightly to act as a solid wall
                if (player.direction === 'up') player.y += player.speed;
                if (player.direction === 'down') player.y -= player.speed;
                if (player.direction === 'left') player.x += player.speed;
                if (player.direction === 'right') player.x -= player.speed;
            }

            // Walking Animation Logic
            if (player.isMoving) {
                player.animTimer++;
                if (player.animTimer >= 12) { player.walkFrame = player.walkFrame === 0 ? 1 : 0; player.animTimer = 0; }
            } else { player.walkFrame = 0; player.animTimer = 0; }

            if (player.direction === 'down') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 3 : 6) : 0;
            else if (player.direction === 'up') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 5 : 8) : 2;
            else if (player.direction === 'left' || player.direction === 'right') player.frameX = player.isMoving ? (player.walkFrame === 0 ? 4 : 7) : 1;
        }

        // --- 6. DRAW EVERYTHING ---
        function draw() {
            if(!gameActive) return;

            // Draw Map
            if(imgMap.complete && imgMap.naturalWidth !== 0) ctx.drawImage(imgMap, 0, 0, canvas.width, canvas.height);
            else { ctx.fillStyle = '#4ade80'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

            // Draw NPC (y=1)
            if(imgSprites.complete && imgSprites.naturalWidth !== 0) {
                ctx.drawImage(imgSprites, npc.frameX * npc.spriteW, npc.frameY * npc.spriteH, npc.spriteW, npc.spriteH, npc.x, npc.y, npc.width, npc.height);
            }

            // Draw Player (with Mirror Magic)
            if(imgSprites.complete && imgSprites.naturalWidth !== 0) {
                ctx.save(); 
                if (player.direction === 'right') {
                    ctx.scale(-1, 1);
                    ctx.drawImage(imgSprites, player.frameX * player.spriteW, player.frameY * player.spriteH, player.spriteW, player.spriteH, -player.x - player.width, player.y, player.width, player.height);
                } else {
                    ctx.drawImage(imgSprites, player.frameX * player.spriteW, player.frameY * player.spriteH, player.spriteW, player.spriteH, player.x, player.y, player.width, player.height);
                }
                ctx.restore(); 
            }
        }

        // --- 7. GAME LOOP ---
        function gameLoop() {
            update();
            draw();
            if(gameActive) requestAnimationFrame(gameLoop); 
        }
    </script>
</body>
</html>
