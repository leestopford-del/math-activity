<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Spin Agency - IGCSE English</title>
    <style>
        /* --- CORE STYLES --- */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; max-width: 100vw; height: 600px; max-height: 100vh; border: 4px solid #3b82f6; border-radius: 8px; overflow: hidden; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-top: 10px; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; transition: filter 0.3s; }
        
        /* --- START SCREEN --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #start-screen h1 { font-size: 36px; color: #60a5fa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        #start-screen h3 { color: #cbd5e1; font-weight: normal; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: center; }
        .input-group input { padding: 10px; font-size: 16px; border-radius: 5px; border: 2px solid #3b82f6; width: 200px; text-align: center; background: #1e293b; color: white; outline: none; }
        .btn { background: #3b82f6; color: white; padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-teacher { background: #d97706; }
        .btn-teacher:hover { background: #b45309; }

        /* --- UI OVERLAYS --- */
        #teacher-panel { display: none; position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); border: 2px solid #fbbf24; border-radius: 8px; padding: 10px; z-index: 40; }
        #teacher-panel h3 { margin: 0 0 10px 0; color: #fbbf24; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #fbbf24; padding-bottom: 5px; }
        .t-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .t-btn { background: #475569; color: white; border: 1px solid #94a3b8; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .t-btn:hover { background: #64748b; }
        .t-btn.danger { background: #ef4444; border-color: #b91c1c; }

        /* --- THE TERMINAL / DESK UI --- */
        #desk-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; height: 500px; background: #f8fafc; color: #0f172a; border-radius: 8px; z-index: 50; box-shadow: 0 20px 50px rgba(0,0,0,0.9); flex-direction: row; overflow: hidden; }
        #desk-content { flex: 1.5; padding: 20px; display: flex; flex-direction: column; position: relative; }
        #desk-audit { flex: 1; background: #e2e8f0; border-left: 2px solid #cbd5e1; padding: 15px; display: flex; flex-direction: column; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 60; }
        
        .facade-text { font-family: 'Georgia', serif; font-size: 18px; line-height: 1.6; padding: 20px; border: 1px solid #cbd5e1; background: white; margin-top: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .truth-text { display: none; font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.5; padding: 20px; background: #000; color: #10b981; margin-top: 10px; border-radius: 4px; position: relative; }
        
        /* The Hack Button & Meter */
        #hack-btn { margin-top: auto; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #hack-btn:hover { background: #dc2626; }
        #suspicion-meter-container { display: none; width: 100%; height: 20px; background: #334155; margin-top: 10px; border-radius: 10px; overflow: hidden; border: 2px solid #ef4444; }
        #suspicion-meter { width: 0%; height: 100%; background: #ef4444; transition: width 0.1s linear; }

        /* Audit Board */
        .audit-messages { flex-grow: 1; overflow-y: auto; background: white; border: 1px solid #cbd5e1; border-radius: 4px; padding: 10px; font-size: 13px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .audit-note { background: #f1f5f9; padding: 8px; border-left: 4px solid #3b82f6; border-radius: 4px; }
        .audit-note strong { color: #1e293b; }
        .audit-note .technique-tag { display: inline-block; background: #3b82f6; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 5px; text-transform: uppercase; }
        
        .audit-input-area { display: flex; flex-direction: column; gap: 5px; }
        .audit-input-area select, .audit-input-area input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        .audit-input-area button { background: #10b981; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Auto-Feedback Alert */
        #feedback-toast { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; z-index: 200; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: center; }

        /* Mobile Controls */
        #mobile-controls { display: none; position: absolute; bottom: 20px; right: 20px; z-index: 20; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .m-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); color: white; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .m-btn:active { background: rgba(255,255,255,0.5); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-action { grid-column: 2; grid-row: 2; background: rgba(59, 130, 246, 0.5); font-size: 12px; border-radius: 10px; }
        @media (max-width: 768px) { #mobile-controls { display: block; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="teacher-panel">
            <h3>Teacher Dashboard - Room: <span id="t-room-code" style="color:white;"></span></h3>
            <div class="t-controls">
                <button class="t-btn" onclick="toggleLock('tech')">Lock/Unlock Tech Room</button>
                <button class="t-btn" onclick="toggleLock('election')">Lock/Unlock Election Room</button>
                <button class="t-btn" onclick="toggleLock('wellness')">Lock/Unlock Wellness Room</button>
                <button class="t-btn danger" onclick="clearRoomData()">Wipe Audit Boards</button>
            </div>
            <div style="margin-top: 10px; font-size: 12px; color: #cbd5e1;">
                <strong>Answer Key:</strong> 
                Tech = <span style="color:#60a5fa">Selection</span> | 
                Election = <span style="color:#60a5fa">Connotation</span> | 
                Wellness = <span style="color:#60a5fa">Authority</span>
            </div>
        </div>

        <div id="desk-modal">
            <button class="close-btn" onclick="closeDesk()">X</button>
            
            <div id="desk-content">
                <h2 id="desk-title" style="margin: 0; color: #3b82f6; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px;">The Facade</h2>
                
                <div id="facade-view" class="facade-text"></div>
                
                <div id="truth-view" class="truth-text"></div>

                <div id="suspicion-meter-container">
                    <div id="suspicion-meter"></div>
                </div>
                
                <button id="hack-btn" onmousedown="startWiretap()" onmouseup="stopWiretap()" onmouseleave="stopWiretap()" ontouchstart="startWiretap()" ontouchend="stopWiretap()">Hold to Wiretap Drafts</button>
                <div style="font-size: 11px; color: #64748b; text-align: center; margin-top: 5px;">Warning: Don't let the suspicion meter fill up!</div>
            </div>

            <div id="desk-audit">
                <h3 style="margin: 0 0 10px 0; color: #0f172a;">Audit Board</h3>
                <div class="audit-messages" id="audit-messages"></div>
                <div class="audit-input-area">
                    <select id="audit-technique">
                        <option value="Selection">Selection (Hiding Facts)</option>
                        <option value="Connotation">Connotation (Emotional Words)</option>
                        <option value="Authority">Authority (Using Experts)</option>
                    </select>
                    <input type="text" id="audit-input" placeholder="Explain the 'Why' bridge..." maxlength="100">
                    <button onclick="submitAudit()">File Audit Report</button>
                </div>
            </div>
        </div>

        <div id="feedback-toast">Feedback goes here</div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="m-btn" id="btn-up">▲</div>
                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-action">ACT</div>
                <div class="m-btn" id="btn-right">▶</div>
                <div class="m-btn" id="btn-down">▼</div>
            </div>
        </div>

        <div id="start-screen">
            <h1>The Spin Agency</h1>
            <h3>Investigate the truth behind the text.</h3>
            
            <div class="input-group">
                <input type="text" id="player-name" placeholder="Your Name" maxlength="12" style="margin-bottom: 10px;"><br>
                <input type="text" id="room-code" placeholder="4-Letter Room Code (e.g. A1B2)" maxlength="4" style="text-transform: uppercase;">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="startGame('student')">Join as Student</button>
                <button class="btn btn-teacher" onclick="checkTeacherLogin()">Join as Teacher</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBXgT_LxFUar6FcfFqKJsuY2YIOjG5JLtM",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets",
            storageBucket: "symmetry-and-nets.firebasestorage.app",
            messagingSenderId: "250211420064",
            appId: "1:250211420064:web:fe4a064715042bedf546c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- GAME STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let myUid = null;
        let players = {};
        let roomCode = "";
        let roomLocks = { tech: false, election: false, wellness: false };
        
        // Lobby is at bottom center
        let localPlayer = { x: 385, y: 520, width: 30, height: 30, speed: 4, name: "Agent", role: "student", color: "#3b82f6", roomCode: "" };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // --- SCENARIO DATA (The Pedagogy) ---
        const scenarioData = {
            tech: {
                title: "Tech Innovation Dept.",
                facade: "<strong>The new X-Phone</strong><br><br>Experience the future today. Our new device features a breathtaking 8K display and an industry-leading 48-hour battery life. It is the smartest choice for professionals.",
                truth: ">> DRAFT LOG 01: The battery lasts 48 hours, but 20% of them overheat and melt.<br><br>> EDITOR NOTE: Delete the overheating part immediately! Just focus on 'industry-leading battery life'. Hide the failures.",
                correctTechnique: "Selection",
                feedback: "Correct! The writers used SELECTION. They hid the negative facts (overheating) and only highlighted the positives to manipulate the buyer."
            },
            election: {
                title: "Mayor's Campaign HQ",
                facade: "<strong>Vote Mayor Smith</strong><br><br>Mayor Smith is implementing vital efficiency savings to streamline our community and protect hard-working taxpayers.",
                truth: ">> DRAFT LOG 01: Mayor Smith is enforcing massive budget cuts to local schools and libraries.<br><br>> EDITOR NOTE: 'Budget cuts' sounds terrible! Change it to 'efficiency savings'. It has a much better connotation and makes him sound smart.",
                correctTechnique: "Connotation",
                feedback: "Correct! The writers used CONNOTATION. 'Budget cuts' has a negative, painful emotion. 'Efficiency savings' frames the exact same action as something positive and smart."
            },
            wellness: {
                title: "Vita-Glow Marketing",
                facade: "<strong>Vita-Glow Water</strong><br><br>Recommended by Dr. Vance for total cellular rejuvenation. Drink daily for maximum health.",
                truth: ">> DRAFT LOG 01: Get Vance to endorse this. I know he's a doctor of literature and not medicine, but people just see 'Dr.' and trust it!<br><br>> EDITOR NOTE: Perfect. Make sure we never mention his actual degree.",
                correctTechnique: "Authority",
                feedback: "Correct! The writers used AUTHORITY. By placing 'Dr.' next to his name, they bypass the reader's critical doubt, even though he isn't a medical expert."
            }
        };

        // --- THE MAP ENVIRONMENT ---
        // 3 Rooms at the top, Lobby at the bottom
        const mapZones = [
            { id: "tech", x: 50, y: 50, w: 200, h: 200, color: "#1e3a8a", label: "Tech Dept.", desk: {x: 100, y: 120, w: 100, h: 40} },
            { id: "election", x: 300, y: 50, w: 200, h: 200, color: "#831843", label: "Campaign HQ", desk: {x: 350, y: 120, w: 100, h: 40} },
            { id: "wellness", x: 550, y: 50, w: 200, h: 200, color: "#064e3b", label: "Wellness Brand", desk: {x: 600, y: 120, w: 100, h: 40} }
        ];
        const lobbyZone = { x: 0, y: 350, w: 800, h: 250, color: "#1e293b" };

        // --- INITIALIZATION ---
        window.checkTeacherLogin = function() {
            const pass = prompt("Enter Teacher Password (hint: IWS):");
            if(pass === "IWS") startGame('teacher');
            else alert("Incorrect password.");
        };

        window.startGame = function(role) {
            let nameInput = document.getElementById('player-name').value.trim();
            let codeInput = document.getElementById('room-code').value.trim().toUpperCase();
            
            if (!codeInput || codeInput.length < 2) { alert("Please enter a valid Room Code (e.g., A1B2)"); return; }
            if (nameInput !== "") localPlayer.name = nameInput;
            
            localPlayer.role = role;
            roomCode = codeInput;
            localPlayer.roomCode = roomCode;

            if(role === 'teacher') {
                localPlayer.color = "#fbbf24";
                document.getElementById('teacher-panel').style.display = 'block';
                document.getElementById('t-room-code').innerText = roomCode;
            }

            document.getElementById('start-screen').style.display = 'none';
            
            signInAnonymously(auth).then(() => {
                myUid = auth.currentUser.uid;
                const myRef = ref(db, `learningLibrary/players/${myUid}`);
                set(myRef, localPlayer);
                onDisconnect(myRef).remove();

                // Listen for Players (Filter by Room Code on client)
                onValue(ref(db, 'learningLibrary/players'), (snapshot) => { 
                    let allPlayers = snapshot.val() || {};
                    players = {};
                    for(let id in allPlayers) {
                        if(allPlayers[id].roomCode === roomCode) players[id] = allPlayers[id];
                    }
                });

                // Listen for Room Locks
                onValue(ref(db, `learningLibrary/meta/${roomCode}_locks`), (snapshot) => {
                    if(snapshot.exists()) roomLocks = snapshot.val();
                });

                gameActive = true;
                gameLoop();
            });
        };

        // --- TEACHER CONTROLS ---
        window.toggleLock = function(roomId) {
            if(localPlayer.role !== 'teacher') return;
            roomLocks[roomId] = !roomLocks[roomId];
            set(ref(db, `learningLibrary/meta/${roomCode}_locks`), roomLocks);
        };

        window.clearRoomData = function() {
            if(localPlayer.role !== 'teacher') return;
            if(confirm("Are you sure you want to wipe all audit boards for this room code?")) {
                remove(ref(db, `learningLibrary/boards/${roomCode}_tech`));
                remove(ref(db, `learningLibrary/boards/${roomCode}_election`));
                remove(ref(db, `learningLibrary/boards/${roomCode}_wellness`));
            }
        };

        // --- INTERACTION & DESK UI ---
        let activeDesk = null;
        let auditListener = null;

        function tryInteract() {
            if(activeDesk) return; // Already open
            
            let px = localPlayer.x + 15; let py = localPlayer.y + 15;
            mapZones.forEach(zone => {
                // Check distance to desk
                let dx = Math.abs(px - (zone.desk.x + zone.desk.w/2));
                let dy = Math.abs(py - (zone.desk.y + zone.desk.h/2));
                if(dx < 80 && dy < 60) openDesk(zone.id);
            });
        }

        function openDesk(roomId) {
            activeDesk = roomId;
            let data = scenarioData[roomId];
            
            document.getElementById('desk-title').innerText = data.title;
            document.getElementById('facade-view').innerHTML = data.facade;
            document.getElementById('truth-view').innerHTML = data.truth;
            
            document.getElementById('desk-modal').style.display = 'flex';
            
            // Connect to localized Firebase board
            let boardPath = `learningLibrary/boards/${roomCode}_${roomId}`;
            auditListener = onValue(ref(db, boardPath), (snapshot) => {
                renderAuditBoard(snapshot.val());
            });
        }

        window.closeDesk = function() {
            activeDesk = null;
            document.getElementById('desk-modal').style.display = 'none';
            stopWiretap(); // Ensure timer stops
            if(auditListener) auditListener(); // Unsubscribe
        };

        // --- WIRETAP (HACKING) MECHANIC ---
        let wiretapActive = false;
        let wiretapProgress = 0;
        let wiretapInterval = null;

        window.startWiretap = function() {
            if(!activeDesk) return;
            wiretapActive = true;
            document.getElementById('facade-view').style.display = 'none';
            document.getElementById('truth-view').style.display = 'block';
            document.getElementById('suspicion-meter-container').style.display = 'block';
            
            // Visual Canvas Glitch Effect
            canvas.style.filter = "invert(0.8) sepia(1) hue-rotate(-50deg) saturate(3)";

            wiretapInterval = setInterval(() => {
                wiretapProgress += 2; // Fills in approx 5 seconds
                document.getElementById('suspicion-meter').style.width = wiretapProgress + '%';
                
                if(wiretapProgress >= 100) {
                    // BUSTED!
                    stopWiretap();
                    closeDesk();
                    showToast("BUSTED! You were caught wiretapping.", "#ef4444");
                    // Teleport back to lobby
                    localPlayer.x = 385; localPlayer.y = 520;
                    if(myUid) set(ref(db, `learningLibrary/players/${myUid}`), localPlayer);
                }
            }, 100);
        };

        window.stopWiretap = function() {
            wiretapActive = false;
            clearInterval(wiretapInterval);
            wiretapProgress = 0;
            document.getElementById('suspicion-meter').style.width = '0%';
            document.getElementById('suspicion-meter-container').style.display = 'none';
            document.getElementById('facade-view').style.display = 'block';
            document.getElementById('truth-view').style.display = 'none';
            canvas.style.filter = "none";
        };

        // --- AUDIT BOARD LOGIC ---
        window.submitAudit = function() {
            if(!activeDesk) return;
            const input = document.getElementById('audit-input');
            const technique = document.getElementById('audit-technique').value;
            const text = input.value.trim();
            
            if(!text) return;

            // 1. Save to Firebase
            let boardPath = `learningLibrary/boards/${roomCode}_${activeDesk}`;
            push(ref(db, boardPath), {
                authorName: localPlayer.name,
                role: localPlayer.role,
                technique: technique,
                text: text,
                createdAt: Date.now()
            });

            // 2. Auto-Feedback (Pedagogy)
            let correctTech = scenarioData[activeDesk].correctTechnique;
            if(technique === correctTech) {
                showToast(scenarioData[activeDesk].feedback, "#10b981"); // Green success
            } else {
                showToast(`Not quite! Look closer. Hint: It's not ${technique}.`, "#f59e0b"); // Orange warning
            }

            input.value = '';
        };

        function renderAuditBoard(messagesObj) {
            const container = document.getElementById('audit-messages');
            container.innerHTML = '';
            if(!messagesObj) return;
            
            const msgs = Object.values(messagesObj).sort((a, b) => a.createdAt - b.createdAt);
            msgs.forEach(msg => {
                let badgeColor = msg.role === 'teacher' ? '#fbbf24' : '#3b82f6';
                let tagColor = msg.technique === scenarioData[activeDesk].correctTechnique ? '#10b981' : '#64748b';
                
                container.innerHTML += `
                    <div class="audit-note">
                        <strong style="color:${badgeColor}">${msg.authorName}</strong> 
                        <span class="technique-tag" style="background:${tagColor}">${msg.technique}</span><br>
                        ${msg.text}
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }

        function showToast(message, color) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = message;
            toast.style.backgroundColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 6000);
        }

        // --- MOVEMENT & PHYSICS ---
        window.addEventListener('keydown', (e) => { keys[e.key] = true; if(e.key === ' ' || e.key === 'Enter') tryInteract(); });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // Mobile Controls
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', (e) => { keys[key] = true; });
            btn.addEventListener('mouseup', (e) => { keys[key] = false; });
        };
        bindBtn('btn-up', 'ArrowUp'); bindBtn('btn-down', 'ArrowDown'); bindBtn('btn-left', 'ArrowLeft'); bindBtn('btn-right', 'ArrowRight');
        document.getElementById('btn-action').addEventListener('touchstart', (e) => { e.preventDefault(); tryInteract(); });
        document.getElementById('btn-action').addEventListener('mousedown', (e) => { tryInteract(); });

        let lastFirebaseUpdate = 0;

        function checkCollision(nx, ny) {
            // Screen bounds
            if(nx < 0 || ny < 0 || nx > 800 - localPlayer.width || ny > 600 - localPlayer.height) return true;
            
            // Check Room Locks (Invisible barriers at the doors)
            // Rooms are Y: 50 to 250. Doors are at Y: 250
            if(ny < 260) {
                if(roomLocks.tech && nx > 50 && nx < 250) return true;
                if(roomLocks.election && nx > 300 && nx < 500) return true;
                if(roomLocks.wellness && nx > 550 && nx < 750) return true;
            }

            // Check Desks (Solid objects)
            for(let zone of mapZones) {
                if (nx < zone.desk.x + zone.desk.w && nx + localPlayer.width > zone.desk.x &&
                    ny < zone.desk.y + zone.desk.h && ny + localPlayer.height > zone.desk.y) {
                    return true;
                }
            }
            return false;
        }

        function update() {
            if (!gameActive || activeDesk) return;

            let isMoving = false;
            let nx = localPlayer.x; let ny = localPlayer.y;

            if (keys.ArrowUp || keys.w) { ny -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowDown || keys.s) { ny += localPlayer.speed; isMoving = true; }
            if (keys.ArrowLeft || keys.a) { nx -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowRight || keys.d) { nx += localPlayer.speed; isMoving = true; }

            if (isMoving) {
                // Apply movement if no collision
                if(!checkCollision(nx, localPlayer.y)) localPlayer.x = nx;
                if(!checkCollision(localPlayer.x, ny)) localPlayer.y = ny;

                // Sync to Firebase
                if (myUid && Date.now() - lastFirebaseUpdate > 33) {
                    set(ref(db, `learningLibrary/players/${myUid}`), localPlayer);
                    lastFirebaseUpdate = Date.now();
                }
            }
        }

        function draw() {
            if(!gameActive) return;

            // 1. Draw Background (Corridors)
            ctx.fillStyle = "#0f172a"; 
            ctx.fillRect(0, 0, 800, 600);

            // 2. Draw Lobby
            ctx.fillStyle = lobbyZone.color;
            ctx.fillRect(lobbyZone.x, lobbyZone.y, lobbyZone.w, lobbyZone.h);
            ctx.fillStyle = "#334155"; ctx.font = "20px Arial"; ctx.textAlign = "center";
            ctx.fillText("Main Lobby - Safe Zone", 400, 580);

            // 3. Draw Rooms
            mapZones.forEach(zone => {
                // Room Floor
                ctx.fillStyle = zone.color;
                ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
                // Room Title
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                ctx.fillText(zone.label, zone.x + zone.w/2, zone.y + 30);
                
                // Draw Locked Barrier if active
                if(roomLocks[zone.id]) {
                    ctx.fillStyle = "rgba(239, 68, 68, 0.5)";
                    ctx.fillRect(zone.x, zone.y + zone.h - 10, zone.w, 10);
                    ctx.fillStyle = "#ef4444"; ctx.font = "12px Arial";
                    ctx.fillText("LOCKED", zone.x + zone.w/2, zone.y + zone.h + 15);
                }

                // Desk
                ctx.fillStyle = "#475569";
                ctx.fillRect(zone.desk.x, zone.desk.y, zone.desk.w, zone.desk.h);
                
                // Interaction Area Marker (Carpet)
                ctx.fillStyle = "rgba(59, 130, 246, 0.2)";
                ctx.fillRect(zone.desk.x - 20, zone.desk.y - 20, zone.desk.w + 40, zone.desk.h + 40);
                ctx.fillStyle = "#60a5fa"; ctx.font = "10px Arial";
                ctx.fillText("[SPACE] to Audit", zone.desk.x + zone.desk.w/2, zone.desk.y + zone.desk.h + 15);
            });

            // 4. Draw Players
            for (let id in players) {
                let p = players[id];
                
                // Body
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x + 15, p.y + 15, 15, 0, Math.PI * 2); ctx.fill();
                
                // Teacher Star
                if(p.role === 'teacher') {
                    ctx.fillStyle = "#000"; ctx.font = "12px Arial"; ctx.textAlign = "center"; ctx.fillText("⭐", p.x + 15, p.y + 20);
                }

                // Nametag
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(p.x - 10, p.y - 20, 50, 18);
                ctx.fillStyle = p.role === 'teacher' ? "#fbbf24" : "white"; 
                ctx.font = "12px Arial"; ctx.textAlign = "center";
                ctx.fillText(p.name, p.x + 15, p.y - 7);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    </script>
</body>
</html>
