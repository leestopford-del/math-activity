<!DOCTYPE html>

    <style>
        /* --- CORE STYLES --- */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; max-width: 100vw; height: 600px; max-height: 100vh; border: 4px solid #3b82f6; border-radius: 8px; overflow: hidden; background: #1e293b; box-shadow: 0 10px 40px rgba(0,0,0,0.9); margin-top: 10px; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* --- LANGUAGE SELECTOR --- */
        #lang-ui { position: absolute; top: 10px; right: 10px; z-index: 300; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 5px 10px; display: flex; align-items: center; gap: 8px; }
        #lang-ui select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px; border-radius: 4px; outline: none; font-size: 14px; }
        #lang-ui select option { color: black; }
        
        /* --- START SCREEN --- */
        #start-screen { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #start-screen h1 { font-size: 38px; color: #60a5fa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        #start-screen h3 { color: #cbd5e1; font-weight: normal; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .input-group input, .input-group select { padding: 10px; font-size: 16px; border-radius: 5px; border: 2px solid #3b82f6; width: 220px; text-align: center; background: #1e293b; color: white; outline: none; }
        .btn { background: #3b82f6; color: white; padding: 12px 24px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-teacher { background: #d97706; }
        .btn-teacher:hover { background: #b45309; }

        /* --- TEACHER DASHBOARD --- */
        #teacher-panel { display: none; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); border: 2px solid #fbbf24; border-radius: 8px; padding: 10px; z-index: 40; max-width: 300px; }
        #teacher-panel h3 { margin: 0 0 10px 0; color: #fbbf24; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #fbbf24; padding-bottom: 5px; }
        .t-controls { display: flex; flex-direction: column; gap: 5px; }
        .t-btn { background: #475569; color: white; border: 1px solid #94a3b8; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .t-btn:hover { background: #64748b; }
        .t-btn.danger { background: #ef4444; border-color: #b91c1c; margin-top: 10px;}

        /* --- THE SIDE-PANEL DESK UI --- */
        #desk-modal { display: none; position: absolute; top: 0; width: 360px; height: 100%; background: #f8fafc; color: #0f172a; z-index: 50; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.8); transition: left 0.3s, right 0.3s; }
        #desk-content { flex: 1.3; padding: 20px; display: flex; flex-direction: column; position: relative; overflow-y: auto; }
        #desk-audit { flex: 1; background: #e2e8f0; border-top: 2px solid #cbd5e1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 60; }
        
        .facade-text { font-family: 'Georgia', serif; font-size: 15px; line-height: 1.5; padding: 15px; border: 1px solid #cbd5e1; background: white; margin-top: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .truth-text { display: none; font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.5; padding: 15px; background: #0f172a; color: #10b981; margin-top: 10px; border-radius: 4px; border-left: 4px solid #10b981; }
        
        /* The Hack Button & Meter */
        #hack-btn { margin-top: 15px; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.2s; user-select: none; }
        #hack-btn:active { background: #1e40af; }
        #suspicion-meter-container { width: 100%; height: 20px; background: #cbd5e1; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 2px solid #3b82f6; }
        #suspicion-meter { width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s linear; }

        /* Audit Board */
        .audit-messages { flex-grow: 1; overflow-y: auto; background: white; border: 1px solid #cbd5e1; border-radius: 4px; padding: 10px; font-size: 13px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .audit-note { background: #f1f5f9; padding: 8px; border-left: 4px solid #3b82f6; border-radius: 4px; }
        .audit-note strong { color: #1e293b; }
        .audit-note .technique-tag { display: inline-block; background: #3b82f6; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 5px; text-transform: uppercase; }
        .audit-input-area { display: flex; flex-direction: column; gap: 5px; }
        .audit-input-area select, .audit-input-area input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; }
        .audit-input-area button { background: #10b981; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Auto-Feedback Toast */
        #feedback-toast { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; z-index: 200; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: center; }

        /* Mobile Controls */
        #mobile-controls { display: none; position: absolute; bottom: 20px; right: 20px; z-index: 20; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .m-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); color: white; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .m-btn:active { background: rgba(255,255,255,0.5); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-action { grid-column: 2; grid-row: 2; background: rgba(59, 130, 246, 0.5); font-size: 12px; border-radius: 10px; }
        @media (max-width: 768px) { #mobile-controls { display: block; } }
    </style>
</head>

            </div>

                <div class="audit-messages" id="audit-messages"></div>

                        <option value="Connotation">Connotation (Emotional Words)</option>
                        <option value="Authority">Authority (Using Experts)</option>

                    <button onclick="submitAudit()" data-i18n="file_audit">File Audit Report</button>
                </div>
            </div>
        </div>

        <div id="feedback-toast">Feedback goes here</div>

        <div id="mobile-controls">
            <div class="d-pad">

                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-action">ACT</div>
                <div class="m-btn" id="btn-right">▶</div>
                <div class="m-btn" id="btn-down">▼</div>
            </div>
        </div>

                busted: "逮捕！あなたを捕まえたのは: ", complete: "完了！真実が明らかになりました。"
            }
        };

        let currentLang = 'en';
        window.t = function(key) { return i18n[currentLang][key] || i18n['en'][key]; };
        window.setLanguage = function(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    if (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'password')) {
                        el.placeholder = i18n[lang][key];
                    } else {
                        el.innerText = i18n[lang][key];
                    }
                }
            });
            if(activeDesk) document.getElementById('desk-title').innerText = t(scenarioData[activeDesk].title);
        };

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBXgT_LxFUar6FcfFqKJsuY2YIOjG5JLtM",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets",
            storageBucket: "symmetry-and-nets.firebasestorage.app",
            messagingSenderId: "250211420064",
            appId: "1:250211420064:web:fe4a064715042bedf546c5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- GAME STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let myUid = null;
        let players = {};
        let roomCode = "";
        let roomLocks = { tech: false, election: false, wellness: false };
        
        let localPlayer = { x: 385, y: 520, width: 30, height: 30, speed: 4, name: "Agent", role: "student", avatar: "hacker", color: "#10b981", roomCode: "" };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // --- SCENARIO DATA (Cambridge Textual Analysis Content) ---
        const scenarioData = {
            tech: {
                title: "tech_dept",
                facade: "<strong>PRESS RELEASE: The Nova X-1 Laptop</strong><br><br>The Nova X-1 is a revolutionary step in computing. It boasts a stunning 8K retina display and an unprecedented 48-hour battery life. Designed for ultimate performance, it is the premier choice for professionals who demand excellence from their devices.",
                truth: ">> DRAFT LOG 01 (Lead Engineer): The battery tests are terrifying. Yes, it lasts 48 hours, but we have a 25% thermal failure rate. The plastic chassis literally melts if they run heavy video editing software for more than an hour.<br><br>>> EDITOR NOTE (PR Director): Delete the overheating part immediately! Just focus on the 'unprecedented 48-hour battery life'. No one needs to know about the melting plastic until after the launch sales. Hide the failures.",
                correctTechnique: "Selection",
                feedback: "Correct! The writers used SELECTION. They hid the negative facts (overheating) and only highlighted the positives to manipulate the buyer."
            },
            election: {
                title: "campaign_hq",
                facade: "<strong>PRESS RELEASE: Vote Mayor Smith</strong><br><br>Mayor Smith is implementing vital 'efficiency savings' to streamline our community services. These strategic financial moves will ensure a prosperous and fiscally responsible future for all hard-working taxpayers in our district.",
                truth: ">> DRAFT LOG 01 (Campaign Analyst): Mayor Smith is enforcing massive budget cuts. We are shutting down 15 local libraries and firing 200 public school teachers to balance the budget. The public is going to hate this.<br><br>>> EDITOR NOTE (Campaign Manager): 'Budget cuts' sounds terrible! Change it to 'efficiency savings'. It has a much better connotation and makes him sound like a genius saving money, rather than a politician taking away their books.",
                correctTechnique: "Connotation",
                feedback: "Correct! The writers used CONNOTATION. 'Budget cuts' has a negative, painful emotion. 'Efficiency savings' frames the exact same action as something positive and smart."
            },
            wellness: {
                title: "wellness_brand",
                facade: "<strong>PRESS RELEASE: Vita-Glow Detox Water</strong><br><br>Refresh your body with Vita-Glow Detox Water! Formulated with active botanical extracts and highly recommended by Dr. Vance for total cellular rejuvenation. Drink daily for maximum health.",
                truth: ">> DRAFT LOG 01 (Product Manager): Get Vance to endorse this water. I know he is a doctor of 17th-century poetry and not medicine, but the public just sees 'Dr.' and trusts it blindly. The water is literally just tap water with artificial lemon flavor.<br><br>>> EDITOR NOTE (Marketing Lead): Perfect. Make sure we never mention his actual degree in literature. The title 'Dr.' gives us the authority we need to sell this tap water at a premium price.",
                correctTechnique: "Authority",
                feedback: "Correct! The writers used AUTHORITY. By placing 'Dr.' next to his name, they bypass the reader's critical doubt, even though he isn't a medical expert."
            }
        };

        // --- MAP & NPCS ---
        const mapZones = [
            { id: "tech", x: 0, y: 50, w: 260, h: 250, color: "#1e3a8a", desk: {x: 100, y: 150, w: 60, h: 30} },
            { id: "election", x: 270, y: 50, w: 260, h: 250, color: "#831843", desk: {x: 370, y: 150, w: 60, h: 30} },
            { id: "wellness", x: 540, y: 50, w: 260, h: 250, color: "#064e3b", desk: {x: 640, y: 150, w: 60, h: 30} }
        ];
        const lobbyZone = { x: 0, y: 350, w: 800, h: 250, color: "#1e293b" };

        let npcs = {
            tech: { x: 50, y: 100, speed: 1.2, alerted: false, path: [{x:50,y:100}, {x:220,y:100}, {x:220,y:250}, {x:50,y:250}], targetIdx: 0, name: "CEO Vance" },
            election: { x: 300, y: 100, speed: 1.2, alerted: false, path: [{x:300,y:100}, {x:500,y:100}], targetIdx: 0, name: "Mgr Sarah" },
            wellness: { x: 550, y: 100, speed: 1.2, alerted: false, path: [{x:550,y:100}, {x:750,y:100}, {x:750,y:250}, {x:550,y:250}], targetIdx: 0, name: "Dr Vance" }
        };

        let downloadProgress = { tech: 0, election: 0, wellness: 0 };
        let truthUnlocked = { tech: false, election: false, wellness: false };

        // --- INITIALIZATION ---
        window.checkTeacherLogin = function() {
            const pass = prompt("Enter Teacher Password (hint: IWS):");
            if(pass === "IWS") startGame('teacher');
            else alert("Incorrect password.");
        };

        window.startGame = function(role) {
            let nameInput = document.getElementById('player-name').value.trim();
            let codeInput = document.getElementById('room-code').value.trim().toUpperCase();
            
            if (!codeInput || codeInput.length < 2) { alert("Please enter a valid Room Code"); return; }
            if (nameInput !== "") localPlayer.name = nameInput;
            
            localPlayer.role = role;
            roomCode = codeInput;
            localPlayer.roomCode = roomCode;

            let avatarChoice = document.getElementById('avatar-select').value;
            localPlayer.avatar = avatarChoice;
            if(avatarChoice === 'hacker') localPlayer.color = "#10b981";
            if(avatarChoice === 'journalist') localPlayer.color = "#3b82f6";
            if(avatarChoice === 'intern') localPlayer.color = "#f59e0b";

            if(role === 'teacher') {
                document.getElementById('teacher-panel').style.display = 'block';
                document.getElementById('t-room-code').innerText = roomCode;
            }

            document.getElementById('start-screen').style.display = 'none';
            setLanguage(currentLang); // Ensure initial translations apply
            
            signInAnonymously(auth).then(() => {
                myUid = auth.currentUser.uid;
                const myRef = ref(db, `learningLibrary/players/${myUid}`);
                set(myRef, localPlayer);
                onDisconnect(myRef).remove();

                onValue(ref(db, 'learningLibrary/players'), (snapshot) => { 
                    let allPlayers = snapshot.val() || {};
                    players = {};
                    for(let id in allPlayers) if(allPlayers[id].roomCode === roomCode) players[id] = allPlayers[id];
                });

                onValue(ref(db, `learningLibrary/meta/${roomCode}_locks`), (snapshot) => {
                    if(snapshot.exists()) roomLocks = snapshot.val();
                });

                gameActive = true;
                gameLoop();
            });
        };

        // --- TEACHER CONTROLS ---
        window.toggleLock = function(roomId) {
            if(localPlayer.role !== 'teacher') return;
            roomLocks[roomId] = !roomLocks[roomId];
            set(ref(db, `learningLibrary/meta/${roomCode}_locks`), roomLocks);
        };
        window.clearRoomData = function() {
            if(localPlayer.role !== 'teacher') return;
            if(confirm("Are you sure?")) {
                remove(ref(db, `learningLibrary/boards/${roomCode}_tech`));
                remove(ref(db, `learningLibrary/boards/${roomCode}_election`));
                remove(ref(db, `learningLibrary/boards/${roomCode}_wellness`));
            }
        };

        // --- INTERACTION & DESK UI ---
        let activeDesk = null;
        let auditListener = null;

        function tryInteract() {
            if(activeDesk) return; 
            let px = localPlayer.x + 15; let py = localPlayer.y + 15;
            mapZones.forEach(zone => {
                let dx = Math.abs(px - (zone.desk.x + 30));
                let dy = Math.abs(py - (zone.desk.y + 15));
                if(dx < 50 && dy < 40) openDesk(zone.id);
            });
        }

        function openDesk(roomId) {
            activeDesk = roomId;
            let data = scenarioData[roomId];
            let modal = document.getElementById('desk-modal');
            
            document.getElementById('desk-title').innerText = t(data.title);
            document.getElementById('facade-view').innerHTML = data.facade;
            document.getElementById('truth-view').innerHTML = data.truth;
            
            // Dynamic Positioning so player can see the NPC coming
            if(roomId === 'wellness') {
                modal.style.left = '0'; modal.style.right = 'auto';
                modal.style.boxShadow = '10px 0 30px rgba(0,0,0,0.8)';
            } else {
                modal.style.right = '0'; modal.style.left = 'auto';
                modal.style.boxShadow = '-10px 0 30px rgba(0,0,0,0.8)';
            }
            
            modal.style.display = 'flex';
            
            // Re-apply logic based on prior unlocks
            if(truthUnlocked[roomId]) {
                document.getElementById('truth-view').style.display = 'block';
                document.getElementById('hack-btn').style.display = 'none';
                document.getElementById('suspicion-meter').style.width = '100%';
                document.getElementById('meter-text').innerText = t('complete');
            } else {
                document.getElementById('truth-view').style.display = 'none';
                document.getElementById('hack-btn').style.display = 'block';
                document.getElementById('suspicion-meter').style.width = downloadProgress[roomId] + '%';
                document.getElementById('meter-text').innerText = t('downloading') + Math.floor(downloadProgress[roomId]) + '%';
            }

            auditListener = onValue(ref(db, `learningLibrary/boards/${roomCode}_${roomId}`), (snapshot) => {
                renderAuditBoard(snapshot.val());
            });
        }

        window.closeDesk = function() {
            activeDesk = null;
            document.getElementById('desk-modal').style.display = 'none';
            stopWiretap();
            if(auditListener) auditListener();
        };

        // --- THE DOWNLOAD / STEALTH MECHANIC ---
        let wiretapActive = false;

        window.startWiretap = function() {
            if(!activeDesk || truthUnlocked[activeDesk]) return;
            wiretapActive = true;
            document.getElementById('hack-btn').style.background = '#1e40af';
        };

        window.stopWiretap = function() {
            wiretapActive = false;
            document.getElementById('hack-btn').style.background = '#3b82f6';
        };

        function updateWiretapLogic() {
            if(!wiretapActive || !activeDesk || truthUnlocked[activeDesk]) return;
            
            // Increment progress: Needs to take ~25 seconds. At 60fps, 0.066 per frame = 100 over 1500 frames.
            downloadProgress[activeDesk] += 0.066;
            
            if(downloadProgress[activeDesk] >= 100) {
                downloadProgress[activeDesk] = 100;
                truthUnlocked[activeDesk] = true;
                wiretapActive = false;
                document.getElementById('truth-view').style.display = 'block';
                document.getElementById('hack-btn').style.display = 'none';
                showToast(t('complete'), "#10b981");
                document.getElementById('meter-text').innerText = t('complete');
            } else {
                document.getElementById('meter-text').innerText = t('downloading') + Math.floor(downloadProgress[activeDesk]) + '%';
            }
            document.getElementById('suspicion-meter').style.width = downloadProgress[activeDesk] + '%';
        }

        function triggerBusted(npcName) {
            stopWiretap();
            downloadProgress[activeDesk] = 0; // Punishing reset!
            closeDesk();
            showToast(t('busted') + " " + npcName + "!", "#ef4444");
            // Teleport to lobby
            localPlayer.x = 385; localPlayer.y = 520;
            if(myUid) set(ref(db, `learningLibrary/players/${myUid}`), localPlayer);
        }

        // --- AUDIT BOARD LOGIC ---
        window.submitAudit = function() {
            if(!activeDesk) return;
            const input = document.getElementById('audit-input');
            const technique = document.getElementById('audit-technique').value;
            const text = input.value.trim();
            if(!text) return;

            push(ref(db, `learningLibrary/boards/${roomCode}_${activeDesk}`), {
                authorName: localPlayer.name, role: localPlayer.role, technique: technique, text: text, createdAt: Date.now()
            });

            let correctTech = scenarioData[activeDesk].correctTechnique;
            if(technique === correctTech) showToast(scenarioData[activeDesk].feedback, "#10b981");
            else showToast(`Not quite! Look closer. Hint: It's not ${technique}.`, "#f59e0b");
            input.value = '';
        };

        function renderAuditBoard(messagesObj) {
            const container = document.getElementById('audit-messages');
            container.innerHTML = '';
            if(!messagesObj) return;
            const msgs = Object.values(messagesObj).sort((a, b) => a.createdAt - b.createdAt);
            msgs.forEach(msg => {
                let badgeColor = msg.role === 'teacher' ? '#fbbf24' : '#3b82f6';
                let tagColor = msg.technique === scenarioData[activeDesk].correctTechnique ? '#10b981' : '#64748b';
                container.innerHTML += `<div class="audit-note"><strong style="color:${badgeColor}">${msg.authorName}</strong> <span class="technique-tag" style="background:${tagColor}">${msg.technique}</span><br>${msg.text}</div>`;
            });
            container.scrollTop = container.scrollHeight;
        }

        function showToast(message, color) {
            const toast = document.getElementById('feedback-toast');
            toast.innerText = message; toast.style.backgroundColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 6000);
        }

        // --- MOVEMENT & PHYSICS ---
        window.addEventListener('keydown', (e) => { keys[e.key] = true; if(e.key === ' ' || e.key === 'Enter') tryInteract(); });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', (e) => { keys[key] = true; });
            btn.addEventListener('mouseup', (e) => { keys[key] = false; });
        };
        bindBtn('btn-up', 'ArrowUp'); bindBtn('btn-down', 'ArrowDown'); bindBtn('btn-left', 'ArrowLeft'); bindBtn('btn-right', 'ArrowRight');
        document.getElementById('btn-action').addEventListener('touchstart', (e) => { e.preventDefault(); tryInteract(); });
        document.getElementById('btn-action').addEventListener('mousedown', (e) => { tryInteract(); });

        let lastFirebaseUpdate = 0;

        function checkCollision(nx, ny) {
            if(nx < 0 || ny < 0 || nx > 800 - localPlayer.width || ny > 600 - localPlayer.height) return true;
            if(ny < 310) {
                if(roomLocks.tech && nx > 0 && nx < 260) return true;
                if(roomLocks.election && nx > 270 && nx < 530) return true;
                if(roomLocks.wellness && nx > 540 && nx < 800) return true;
                // Wall spaces between rooms
                if(nx >= 260 && nx <= 270) return true;
                if(nx >= 530 && nx <= 540) return true;
            }
            for(let zone of mapZones) {
                if (nx < zone.desk.x + zone.desk.w && nx + localPlayer.width > zone.desk.x && ny < zone.desk.y + zone.desk.h && ny + localPlayer.height > zone.desk.y) return true;
            }
            return false;
        }

        function update() {
            if (!gameActive) return;

            // 1. Update Player
            if (!activeDesk) {
                let isMoving = false; let nx = localPlayer.x; let ny = localPlayer.y;
                if (keys.ArrowUp || keys.w) { ny -= localPlayer.speed; isMoving = true; }
                if (keys.ArrowDown || keys.s) { ny += localPlayer.speed; isMoving = true; }
                if (keys.ArrowLeft || keys.a) { nx -= localPlayer.speed; isMoving = true; }
                if (keys.ArrowRight || keys.d) { nx += localPlayer.speed; isMoving = true; }
                if (isMoving) {
                    if(!checkCollision(nx, localPlayer.y)) localPlayer.x = nx;
                    if(!checkCollision(localPlayer.x, ny)) localPlayer.y = ny;
                    if (myUid && Date.now() - lastFirebaseUpdate > 33) {
                        set(ref(db, `learningLibrary/players/${myUid}`), localPlayer); lastFirebaseUpdate = Date.now();
                    }
                }
            }

            // 2. Update Wiretap Progress
            updateWiretapLogic();

            // 3. Update NPCs
            for(let id in npcs) {
                let npc = npcs[id];
                let target = npc.path[npc.targetIdx];
                let currentSpeed = npc.speed;
                
                if(wiretapActive && activeDesk === id && !truthUnlocked[id]) {
                    npc.alerted = true; target = { x: localPlayer.x, y: localPlayer.y }; currentSpeed = npc.speed * 1.5;
                } else { npc.alerted = false; }

                let dx = target.x - npc.x; let dy = target.y - npc.y; let dist = Math.hypot(dx, dy);
                if(dist > 2) { npc.x += (dx / dist) * currentSpeed; npc.y += (dy / dist) * currentSpeed; } 
                else if (!npc.alerted) { npc.targetIdx = (npc.targetIdx + 1) % npc.path.length; }

                if(npc.alerted && activeDesk === id) {
                    let pDist = Math.hypot(localPlayer.x - npc.x, localPlayer.y - npc.y);
                    if(pDist < 25) triggerBusted(npc.name);
                }
            }
        }

        function draw() {
            if(!gameActive) return;

            // Background Floor
            ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, 800, 600);

            // Lobby
            ctx.fillStyle = lobbyZone.color; ctx.fillRect(lobbyZone.x, lobbyZone.y, lobbyZone.w, lobbyZone.h);
            ctx.fillStyle = "#334155"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.fillText(t('safe_zone'), 400, 560);

            // Rooms
            mapZones.forEach(zone => {
                ctx.fillStyle = zone.color; ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
                // Grid/Carpet Pattern
                ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1;
                for(let i=0; i<zone.w; i+=20) { ctx.beginPath(); ctx.moveTo(zone.x+i, zone.y); ctx.lineTo(zone.x+i, zone.y+zone.h); ctx.stroke(); }
                for(let i=0; i<zone.h; i+=20) { ctx.beginPath(); ctx.moveTo(zone.x, zone.y+i); ctx.lineTo(zone.x+zone.w, zone.y+i); ctx.stroke(); }

                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center"; ctx.fillText(t(scenarioData[zone.id].title), zone.x + zone.w/2, zone.y + 30);
                
                if(roomLocks[zone.id]) {
                    ctx.fillStyle = "rgba(239, 68, 68, 0.5)"; ctx.fillRect(zone.x, zone.y + zone.h - 10, zone.w, 10);
                    ctx.fillStyle = "#ef4444"; ctx.font = "12px Arial"; ctx.fillText(t('locked'), zone.x + zone.w/2, zone.y + zone.h + 15);
                }

                // Desk & Computer Asset
                ctx.fillStyle = "#334155"; ctx.fillRect(zone.desk.x, zone.desk.y, zone.desk.w, zone.desk.h); // Desk
                ctx.fillStyle = "#94a3b8"; ctx.fillRect(zone.desk.x + 10, zone.desk.y + 5, 20, 15); // Monitor stand
                ctx.fillStyle = "#38bdf8"; ctx.fillRect(zone.desk.x + 12, zone.desk.y + 7, 16, 11); // Glowing Screen
                
                // Interaction Area
                ctx.fillStyle = "rgba(59, 130, 246, 0.2)"; ctx.fillRect(zone.desk.x - 20, zone.desk.y - 20, zone.desk.w + 40, zone.desk.h + 40);
                ctx.fillStyle = "#60a5fa"; ctx.font = "10px Arial"; ctx.fillText(t('press_space'), zone.desk.x + zone.desk.w/2, zone.desk.y + zone.desk.h + 15);
            });

            // Draw NPCs
            for(let id in npcs) {
                let npc = npcs[id];
                ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.arc(npc.x + 15, npc.y + 25, 12, 0, Math.PI*2); ctx.fill(); // shadow
                ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(npc.x + 15, npc.y + 15, 15, 0, Math.PI*2); ctx.fill(); // body
                if(npc.alerted) { ctx.fillStyle = "#facc15"; ctx.font = "bold 20px Arial"; ctx.fillText("❗", npc.x + 15, npc.y - 5); } // alert
                ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.textAlign = "center"; ctx.fillText(npc.name, npc.x + 15, npc.y + 5); // name
            }

            // Draw Players
            for (let id in players) {
                let p = players[id];
                ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.arc(p.x + 15, p.y + 25, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = p.color || "#10b981"; ctx.beginPath(); ctx.arc(p.x + 15, p.y + 15, 15, 0, Math.PI * 2); ctx.fill();
                
                let icon = "💻"; if(p.avatar === 'journalist') icon = "📝"; if(p.avatar === 'intern') icon = "☕"; if(p.role === 'teacher') icon = "⭐";
                ctx.fillStyle = "white"; ctx.font = "14px Arial"; ctx.textAlign = "center"; ctx.fillText(icon, p.x + 15, p.y + 20);

                ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(p.x - 10, p.y - 20, 50, 16);
                ctx.fillStyle = p.role === 'teacher' ? "#fbbf24" : "white"; ctx.font = "10px Arial"; ctx.fillText(p.name, p.x + 15, p.y - 9);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    </script>
</body>
