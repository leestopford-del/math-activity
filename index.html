<!DOCTYPE html>
<html>
<head>

    <style>

        .hub-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; }

        .card:hover { transform: translateY(-10px); border-color: #00ffcc; }
        .btn {

            text-decoration: none; font-weight: bold; border-radius: 5px; 
            display: inline-block; margin-top: 15px; 
        }
        .math-card { border-color: #f59e0b; }
        .math-btn { background: #f59e0b; color: white; }
    </style>
</head>
<body>
    <h1>Welcome to the Interactive Lab</h1>

        <div class="card">
            <h2>⚡ Science Lab</h2>
            <p>Activity: Electric Highway<br>(Conductors & Insulators)</p>
            <a href="Electric-Highway.html" class="btn">ENTER LAB</a>
        </div>

        <div class="card math-card">
            <h2>📐 Math Room</h2>
            <p>Activity: Unfolding Magic<br>(3D Shape Nets)</p>
            <a href="math-nets.html" class="btn math-btn">ENTER ROOM</a>

</html>
