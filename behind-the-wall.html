<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behind the Wall: Persona Guess</title>
    <style>
        :root {
            --wood: #5d4037;
            --paper: #f4f1ea;
            --accent: #ff9800;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; }
        
        /* THE WALL VISUAL */
        #game-container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .wall { 
            background: var(--wood); 
            border: 15px solid #3e2723; 
            height: 300px; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }
        .quote-paper {
            background: var(--paper);
            color: #333;
            padding: 30px;
            width: 80%;
            transform: rotate(-1deg);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            font-style: italic;
            font-size: 1.2rem;
        }
        .revealed .wall { background: #8bc34a; border-color: #558b2f; }

        /* LOBBY & UI */
        .btn { padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-vote { background: #3498db; color: white; width: 200px; }
        .btn-host { background: var(--accent); color: white; }
        .hidden { display: none; }
        
        .vote-tally { font-size: 0.9rem; color: #bdc3c7; margin-top: 5px; }
        .timer { font-size: 2rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>Waiting Room</h1>
        <p id="player-count">Players ready: 0</p>
        <div id="host-controls" class="hidden">
            <button class="btn btn-host" onclick="startGame()">START GAME (7 ROUNDS)</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="timer" id="countdown">20</div>
        <div class="wall" id="mystery-wall">
            <div id="quote-display" class="quote-paper">"Loading speech..."</div>
        </div>

        <div id="voting-options" style="margin-top: 20px;">
            </div>

        <div id="host-reveal-zone" class="hidden" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 20px;">
            <button class="btn btn-host" onclick="revealPersona()">REVEAL ANSWER</button>
            <button class="btn btn-host" onclick="nextRound()">NEXT ROUND</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <h1>Final Score</h1>
        <h2 id="final-tally">0 / 7 Correct</h2>
        <button class="btn btn-vote" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Insert your Firebase Config here
        const firebaseConfig = {
            apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'persona_game');

        // --- GAME CONTENT ---
        const allPersonas = [
            { q: "Listen, the current trajectory of the local youth center is frankly abysmal. We need a complete overhaul or we’re walking out.", p: "Angry Community Leader", options: ["Angry Community Leader", "Bored Student", "Police Officer", "Formal Secretary"] },
            { q: "Yo, I was thinking maybe we could like, grab some food or whatever after the thing finishes? If you're down.", p: "Casual Friend", options: ["Formal Boss", "Casual Friend", "Academic Professor", "News Anchor"] },
            { q: "It is with great trepidation that I announce the closure of the city library, a pillar of our intellectual heritage.", p: "Formal Mayor", options: ["Library Thief", "Formal Mayor", "Excited Child", "Sports Coach"] },
            // ... I will provide the other 22 in a text block for you to paste in
        ];

        let isHost = false;
        let myId = Math.random().toString(36).substr(2, 9);

        // --- CORE LOGIC ---
        
        // 1. Join Lobby
        const playerRef = ref(db, 'persona_game/players/' + myId);
        set(playerRef, { id: myId, name: "Student" });

        onValue(ref(db, 'persona_game/players'), (snapshot) => {
            const players = snapshot.val();
            const count = players ? Object.keys(players).length : 0;
            document.getElementById('player-count').innerText = `Players ready: ${count}`;
            
            // First player becomes host
            if(Object.keys(players)[0] === myId) {
                isHost = true;
                document.getElementById('host-controls').classList.remove('hidden');
            }
        });

        // 2. Sync Game State
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.state === 'playing') {
                showGame(data);
            } else if (data.state === 'results') {
                showResults(data);
            }
        });

        window.startGame = () => {
            const selected = allPersonas.sort(() => 0.5 - Math.random()).slice(0, 7);
            update(gameRef, {
                state: 'playing',
                round: 0,
                score: 0,
                rounds: selected,
                isRevealed: false
            });
        };

        function showGame(data) {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            const current = data.rounds[data.round];
            
            document.getElementById('quote-display').innerText = data.isRevealed ? `REVEALED: It was the ${current.p}!` : `"${current.q}"`;
            
            if (isHost) document.getElementById('host-reveal-zone').classList.remove('hidden');

            const optionsDiv = document.getElementById('voting-options');
            optionsDiv.innerHTML = '';
            current.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-vote';
                btn.innerText = opt;
                btn.onclick = () => castVote(opt, current.p);
                optionsDiv.appendChild(btn);
            });
        }

        // Rest of the voting and round logic would go here...
    </script>
</body>
</html>
