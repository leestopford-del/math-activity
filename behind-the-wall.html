<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behind the Wall: IGCSE English 5.2</title>
    <style>
        :root { --wood: #5d4037; --paper: #fdfdfd; --accent: #e67e22; --green: #2ecc71; }
        body { font-family: 'Georgia', serif; background: #1a1a1a; color: white; text-align: center; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* THE WALL */
        .wall-container { position: relative; height: 350px; background: var(--wood); border: 12px solid #3e2723; border-radius: 5px; overflow: hidden; margin: 20px 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .quote-bubble { background: var(--paper); color: #222; padding: 30px; width: 70%; font-size: 1.4rem; line-height: 1.6; box-shadow: 5px 5px 0px rgba(0,0,0,0.1); border-radius: 3px; position: relative; z-index: 2; transition: transform 0.5s; }
        .reveal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(100%); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 5; }
        .reveal-overlay.show { transform: translateY(0); }

        /* LOBBY & UI */
        .card { background: #2c3e50; padding: 30px; border-radius: 15px; border-bottom: 5px solid var(--accent); }
        .btn { padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; margin: 10px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-vote { background: #444; color: white; width: 45%; margin: 5px; }
        .btn-vote:hover { background: #555; }
        .btn-vote.selected { background: #3498db; border: 2px solid white; }
        .hidden { display: none !important; }
        .player-tag { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="lobby-screen" class="card">
        <h1>Who's Behind the Wall?</h1>
        <p><i>IGCSE English 5.2: Adapting Voice, Tone & Register</i></p>
        <div id="join-area">
            <input type="text" id="player-name" placeholder="Your Name..." style="padding: 12px; border-radius: 5px; border: none; width: 200px;">
            <button class="btn btn-main" onclick="joinGame()">Enter Lobby</button>
        </div>
        <div id="wait-area" class="hidden">
            <h3>Students in Lobby:</h3>
            <div id="player-list"></div>
            <div id="host-panel" class="hidden">
                <hr style="border: 0.5px solid #444; margin: 20px 0;">
                <p style="color: var(--accent)"><b>YOU ARE THE HOST</b></p>
                <button class="btn btn-main" onclick="startGame()">Start Game (7 Rounds)</button>
                <button class="btn" style="background: #c0392b; color: white;" onclick="resetServer()">Reset Server</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <h3 id="round-num">Round 1 / 7</h3>
        <div class="wall-container">
            <div id="quote-box" class="quote-bubble">"Checking for a voice..."</div>
            <div id="reveal-layer" class="reveal-overlay">
                <h2 style="color: var(--green);">PERSONA REVEALED:</h2>
                <h1 id="correct-answer-text">???</h1>
                <p id="register-hint" style="padding: 0 40px; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div id="options-area" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>

        <div id="host-actions" class="hidden" style="margin-top: 30px; background: #333; padding: 15px; border-radius: 10px;">
            <button class="btn btn-main" id="reveal-btn" onclick="triggerReveal()">REVEAL NOW</button>
            <button class="btn btn-main hidden" id="next-btn" onclick="triggerNext()">NEXT ROUND</button>
        </div>
    </div>

    <div id="results-screen" class="hidden" class="card">
        <h1>Class Performance Complete!</h1>
        <p>You have mastered Topic 5.2.</p>
        <button class="btn btn-main" onclick="location.reload()">Return to Menu</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    // Your exact Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'behind_the_wall');

    // PERSONA DATASET (15 Scenarios based on IGCSE Register Slips)
    const personaBank = [
        { q: "Attention students. It has come to my attention that some of you are treating the common room like a landfill. This ends now.", p: "Strict Headteacher", hint: "Register: Formal/Authoritative. Tone: Stern.", opts: ["Strict Headteacher", "Frustrated Student", "Local Mayor", "Angry Janitor"] },
        { q: "Listen, I’m writing to complain because the laptop I bought from you is literally a brick. It won’t even turn on.", p: "Disgruntled Customer", hint: "Register: Semi-formal. Tone: Aggressive/Accusatory.", opts: ["Disgruntled Customer", "Tech Support Agent", "Bored Teenager", "Formal Lawyer"] },
        { q: "OMG, I am literally crying right now. You will never guess who I just saw at the airport!", p: "Excited Teenager", hint: "Register: Informal. Tone: Hyperbolic.", opts: ["Excited Teenager", "Professional Reporter", "Stressed Pilot", "Formal Diplomat"] },
        { q: "The defendant was observed exiting the premises at 22:00 hours, carrying a concealed item.", p: "Police Officer", hint: "Register: Formal/Technical. Tone: Objective.", opts: ["Police Officer", "Gossip Columnist", "Nervous Thief", "Academic Historian"] },
        { q: "Welcome back to the morning show! Coming up next: how to bake the perfect soufflé in ten minutes.", p: "TV Presenter", hint: "Register: Enthusiastic. Tone: Engaging/Friendly.", opts: ["TV Presenter", "Bored Chef", "Professional Athlete", "Strict General"] },
        { q: "I am writing to express my profound dissatisfaction with the lackluster service at your establishment.", p: "Formal Complainant", hint: "Register: High Formal. Tone: Sophisticated/Polite.", opts: ["Formal Complainant", "Angry Child", "Casual Reviewer", "Funny Comedian"] },
        { q: "Look, the data clearly shows a 15% increase in global temperatures. We cannot ignore this any longer.", p: "Environmental Scientist", hint: "Register: Academic. Tone: Urgent/Informative.", opts: ["Environmental Scientist", "Politics Student", "Weather Reporter", "Nature Enthusiast"] },
        { q: "Get those knees up! If you're not sweating, you're not trying! Let's go, let's go!", p: "Sports Coach", hint: "Register: Imperative. Tone: Motivational/Strict.", opts: ["Sports Coach", "Angry Parent", "Army Sergeant", "Friendly Librarian"] },
        { q: "Once upon a time, in a kingdom far beyond the misty mountains, lived a very lonely giant.", p: "Storyteller", hint: "Register: Narrative. Tone: Whimsical.", opts: ["Storyteller", "History Teacher", "Bored Child", "Formal Author"] },
        { q: "Your pizza is ready for pickup. That'll be twelve dollars and fifty cents, please.", p: "Fast Food Worker", hint: "Register: Transactional. Tone: Neutral/Polite.", opts: ["Fast Food Worker", "Professional Chef", "Hungry Customer", "Bank Teller"] },
        { q: "May it please the court, my client is entirely innocent of these baseless accusations.", p: "Defence Lawyer", hint: "Register: Legal Formal. Tone: Persuasive.", opts: ["Defence Lawyer", "Angry Accuser", "Strict Judge", "Bored Clerk"] },
        { q: "Ladies and Gentlemen, please fasten your seatbelts. We are experiencing a bit of turbulence.", p: "Flight Pilot", hint: "Register: Professional. Tone: Calm/Reassuring.", opts: ["Flight Pilot", "Scared Passenger", "Tour Guide", "Train Guard"] },
        { q: "I'm so sorry I missed your birthday, man! I totally lost track of the days. Let's hang out soon?", p: "Casual Friend", hint: "Register: Informal. Tone: Apologetic.", opts: ["Casual Friend", "Strict Boss", "Formal Secretary", "Distant Relative"] },
        { q: "The results of your blood test are back. I'd like you to come in for a chat this afternoon.", p: "Medical Doctor", hint: "Register: Clinical. Tone: Serious/Professional.", opts: ["Medical Doctor", "Worried Parent", "Friendly Nurse", "Health Blogger"] },
        { q: "I reckon if we head south by sunset, we'll hit the border before the sheriff catches us.", p: "Outlaw/Cowboy", hint: "Register: Dialect/Informal. Tone: Determined.", opts: ["Outlaw/Cowboy", "History Professor", "Police Officer", "Friendly Guide"] }
    ];

    let myName = "";
    let isHost = false;

    // --- GAME FUNCTIONS ---
    window.joinGame = () => {
        const input = document.getElementById('player-name');
        if (!input.value) return alert("Enter your name!");
        myName = input.value;
        document.getElementById('join-area').classList.add('hidden');
        document.getElementById('wait-area').classList.remove('hidden');
        set(ref(db, 'behind_the_wall/players/' + myName), { name: myName });
    };

    window.startGame = () => {
        const selected = personaBank.sort(() => 0.5 - Math.random()).slice(0, 7);
        update(gameRef, {
            state: 'playing',
            round: 0,
            rounds: selected,
            isRevealed: false
        });
    };

    window.resetServer = () => {
        remove(gameRef);
        location.reload();
    };

    window.triggerReveal = () => update(gameRef, { isRevealed: true });
    
    window.triggerNext = () => {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if (data.round >= 6) {
                update(gameRef, { state: 'results' });
            } else {
                update(gameRef, { round: data.round + 1, isRevealed: false });
            }
        }, { onlyOnce: true });
    };

    // --- REALTIME SYNC ---
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Lobby Sync & Host Designation
        const players = data.players || {};
        const playerList = document.getElementById('player-list');
        playerList.innerHTML = "";
        const names = Object.keys(players);
        
        names.forEach((n, i) => {
            const span = document.createElement('span');
            span.className = 'player-tag';
            span.innerHTML = n + (i === 0 ? " 👑" : "");
            playerList.appendChild(span);
            // The first person to join becomes Host
            if (i === 0 && n === myName) {
                isHost = true;
                document.getElementById('host-panel').classList.remove('hidden');
            }
        });

        // Game Flow Sync
        if (data.state === 'playing') {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            const curRound = data.rounds[data.round];
            document.getElementById('round-num').innerText = `Round ${data.round + 1} / 7`;
            document.getElementById('quote-box').innerText = `"${curRound.q}"`;

            // Handle Reveal State
            if (data.isRevealed) {
                document.getElementById('reveal-layer').classList.add('show');
                document.getElementById('correct-answer-text').innerText = curRound.p;
                document.getElementById('register-hint').innerText = curRound.hint;
                if (isHost) {
                    document.getElementById('reveal-btn').classList.add('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');
                }
            } else {
                document.getElementById('reveal-layer').classList.remove('show');
                renderOptions(curRound.opts);
                if (isHost) {
                    document.getElementById('host-actions').classList.remove('hidden');
                    document.getElementById('reveal-btn').classList.remove('hidden');
                    document.getElementById('next-btn').classList.add('hidden');
                }
            }
        }

        // Results State
        if (data.state === 'results') {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
        }
    });

    // Option Rendering Logic
    function renderOptions(opts) {
        const area = document.getElementById('options-area');
        area.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn btn-vote';
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.btn-vote').forEach(el => el.classList.remove('selected'));
                b.classList.add('selected');
            };
            area.appendChild(b);
        });
    }
</script>

</body>
</html>
